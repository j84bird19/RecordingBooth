<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#121318" />
  <title>Recording Booth / Mic Check</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Recording Booth <span>/ Mic Check</span></h1>
      <p class="subtitle">Fresh DAW core · stems for Logic</p>
    </div>
    <div class="status-pill" id="statusPill">Idle</div>
  </header>

  <main class="app-shell">
    <section class="transport panel">
      <div class="transport-row">
        <button id="enableAudioBtn" class="btn primary">Enable Audio / Mic</button>
        <button id="recordModeBtn" class="btn record">● Record Off</button>
        <button id="rewindBtn" class="btn">⏮ Rewind</button>
        <button id="playBtn" class="btn play">▶ Play</button>
        <button id="stopBtn" class="btn stop">■ Stop</button>
      </div>
      <div class="transport-row small">
        <label>Song <input id="songNameInput" value="MicCheckSong" /></label>
        <span id="timeReadout">0:00.00</span>
        <span class="hint">R arms a vocal track. Record mode + Play starts recording.</span>
      </div>
    </section>

    <section class="panel overview-panel">
      <div class="section-title">Song Overview</div>
      <div id="timeline" class="timeline"></div>
    </section>

    <section class="panel track-panel">
      <div class="section-title">Tracks</div>
      <div id="tracks"></div>
    </section>

    <section class="panel export-panel">
      <div class="section-title">Project / Export</div>
      <div class="transport-row">
        <button id="saveProjectBtn" class="btn">Save Project</button>
        <button id="loadProjectBtn" class="btn">Load Project</button>
        <button id="exportDryBtn" class="btn">Export Dry Stems</button>
        <button id="exportMixBtn" class="btn">Export Rough Mix</button>
      </div>
      <p class="hint">Dry stems export from 0:00 so they line up in Logic.</p>
    </section>
  </main>

  <input id="musicFile1" type="file" accept="audio/*" hidden />
  <input id="musicFile2" type="file" accept="audio/*" hidden />

  <script src="app.js"></script>
</body>
</html>
